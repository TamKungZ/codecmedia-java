name: Deep Tests

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  deep-tests:
    strategy:
      fail-fast: false
      matrix:
        java: ['17', '21']
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ matrix.java }}
          cache: maven

      - name: Compile and package gate
        run: mvn -B -Dgpg.skip=true -DskipTests clean package

      - name: Full project test suite
        run: mvn -B -Dgpg.skip=true test

      - name: Facade and integration-style tests
        run: |
          mvn -B -Dgpg.skip=true -Dtest=CodecMediaFacadeTest test
          mvn -B -Dgpg.skip=true -Dtest=CodecMediaRoundTripConversionTest test
          mvn -B -Dgpg.skip=true -Dtest=CodecMediaPlayTest test

      - name: Audio parser unit tests
        run: |
          mvn -B -Dgpg.skip=true -Dtest=Mp3ParserTest test
          mvn -B -Dgpg.skip=true -Dtest=OggParserTest test
          mvn -B -Dgpg.skip=true -Dtest=WavParserTest test
          mvn -B -Dgpg.skip=true -Dtest=FlacParserTest test
          mvn -B -Dgpg.skip=true -Dtest=AiffParserTest test

      - name: IO unit tests
        run: mvn -B -Dgpg.skip=true -Dtest=ByteArrayReaderTest test

      - name: Usage example smoke test
        run: mvn -B -Dgpg.skip=true -Dtest=CodecMediaUsageExample test
